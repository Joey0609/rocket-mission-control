<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务游客页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Orbitron:wght@500;700;900&family=Saira:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/visitor.css">
  <link rel="stylesheet" href="/static/css/notification.css">
</head>
<body>
  <div class="nebula"></div>
  <div class="grid-overlay"></div>

  <main class="visitor-shell" id="visitorShell">
    <header class="hero">
      <div class="hero-meta-row">
        <div class="hero-meta-left">
          <div class="tag">PUBLIC VIEW</div>
          <div class="signal" id="channelMode">实时通道: 连接中</div>
        </div>
        <button class="theme-btn" id="openThemeModalBtn">主题</button>
        <!-- <div class="copyright">Copyright Joey0609，北斗-玉衡</div> -->
      </div>
      <h1 class="hero-title">
        <span id="modelName">等待选择型号</span>
        <span id="payloadName" class="payload-name hidden"></span>
      </h1>
      <p id="statusLine">等待任务初始化</p>
    </header>

    <section class="clock-board">
      <article class="clock-card primary pulse-card" id="missionCard">
        <span class="label">任务计时</span>
        <span class="clock" id="missionClock">T-00:00.000</span>
      </article>
    </section>

    <section class="timeline-info">
      <div class="panel">
        <h2>当前阶段</h2>
        <div class="big" id="currentStage">待命</div>
      </div>
      <div class="panel">
        <h2>当前事件</h2>
        <div class="big" id="currentEvent">等待节点</div>
      </div>
      <div class="panel">
        <h2>说明</h2>
        <p id="nextDescription">暂无</p>
      </div>
    </section>

  </main>

  <section class="mission-overlay" aria-live="polite">
    <div class="mission-overlay-clock">
      <span class="overlay-hold-indicator" id="overlayHoldIndicator" aria-hidden="true"></span>
      <div class="mission-overlay-prefix">
        <span>T</span>
        <span id="overlayClockSign">-</span>
      </div>
      <div class="mission-overlay-time" id="overlayClockTime">00:00:00</div>
    </div>
    <div class="mission-overlay-line">
      <span id="overlayMissionName">待命任务</span><span id="overlayVehicleChunk" class="hidden"> · <span id="overlayVehicleName">等待选择型号</span></span><span id="overlayPayloadChunk" class="overlay-payload hidden">-</span>
    </div>
  </section>

  <section class="timeline-fixed-layer" aria-hidden="true">
    <aside class="timeline-side timeline-side-left telemetry-panel-hidden" aria-hidden="true">
      <div class="timeline-side-bg"></div>
      <div class="telemetry-gauges" id="telemetryGaugesLeft"></div>
    </aside>
    <aside class="timeline-side timeline-side-right telemetry-panel-hidden" aria-hidden="true">
      <div class="timeline-side-bg"></div>
      <div class="telemetry-gauges" id="telemetryGaugesRight"></div>
    </aside>
    <div class="timeline-mount" id="timelineMount"></div>
    <div class="timeline-gradient-bar"></div>
  </section>

  <div class="theme-modal hidden" id="themeModal" role="dialog" aria-modal="true" aria-label="主题选择">
    <div class="theme-backdrop" id="themeBackdrop"></div>
    <div class="theme-panel panel">
      <h3>选择主题</h3>
      <div class="theme-grid" id="themeGrid"></div>
      <div class="row">
        <button class="btn accent" id="applyThemeBtn">确认主题</button>
        <button class="btn" id="cancelThemeBtn">取消</button>
      </div>
    </div>
  </div>

  <script src="/static/js/notification.js"></script>
  <script src="/static/js/themes.js"></script>
  <script src="/static/js/live-channel.js"></script>
  <script src="/static/js/timeline/constants.js"></script>
  <script src="/static/js/timeline/easing.js"></script>
  <script src="/static/js/timeline/color.js"></script>
  <script src="/static/js/timeline/time-map.js"></script>
  <script src="/static/js/timeline/geometry.js"></script>
  <script src="/static/js/timeline/nodes.js"></script>
  <script src="/static/js/timeline/svg-drawing.js"></script>
  <script src="/static/js/timeline/renderer.js"></script>
  <script src="/static/js/telemetry/gauge.js"></script>
  <script src="/static/js/telemetry/gauge-panel.js"></script>
  <script src="/static/js/visitor.js"></script>
</body>
</html>
